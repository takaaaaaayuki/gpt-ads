name: GPT Ads

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build report and site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-haiku-4-5' }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GPT_ADS_MAX_ITEMS_PER_RUN: "24"
          GPT_ADS_USE_SAMPLE_DATA: "0"
        run: python -m project.main

      - name: Commit generated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/processed/archive.jsonl
          git diff --cached --quiet || git commit -m "Update generated GPT Ads site"
          git push
