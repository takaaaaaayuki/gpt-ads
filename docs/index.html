  <script>

Iではなく、人に向けて書く \n\n\n AI向けに最適化しようとして、次のような施策を進めてはいけない： \n\n\n \n キーワードを詰め込む \n コンテンツを不自然なまとまりに分割する \n ボット向けに特化して最適化しようとする \n \n\n\n 上記のようなことをしなくても、グーグルのシステムは自然言語を理解できるからだ。 \n\n\n\n また、「ブログ」「動画」「フォーラム」などで不自然な言及を追い求めることも、効果的ではない。そうしたプラットフォームに参加する場合は、「ブランド独自の声と権威性を反映した、新鮮で役立つコンテンツ」に注力すべきである。 \n\n\n\n\n AI特化型の技術的な小手先の工夫は避ける \n\n\n llms.txtのような特殊なファイルは、グーグル検索には必要ない。このような施策は、パフォーマンスを改善することなくノイズを増やすだけである。 \n\n\n\n\n 自社ブランドにしか作れないコンテンツを作る \n\n\n\n\n 誰にでも書ける一般的な記事よりも価値があるのは、次のようなものだ： \n\n\n \n 一次体験 \n 専門家の洞察 \n 独自の視点 \n \n\n\n\n\n 自社が提供できる「実世界のストーリー」や「独自の専門性」について考えてみるべきだ。それこそが、「コモディティではないコンテンツ」であり、競争優位性になる。 \n\n\n\n\n グーグルの構造化されたビジネスデータを活用する \n\n\n マーチャントのフィードやグーグルビジネスプロフィールは、通常の検索結果だけでなく、AI生成の回答にも商品やローカルビジネス情報が表示される助けになる。 \n\n\n\n\n ウェブサイトへの投資を続ける \n\n\n 次のようなものは、AI検索と従来の検索の両方にとって、今も重要なシグナルである： \n\n\n \n ページの読み込みが速いこと \n ページがモバイルに対応していること \n メインコンテンツが明確であること \n 高品質な画像や動画を利用していること \n \n\n\n\n AIの表示面から訪れるユーザーは、すでに多くの情報を得た状態で訪問していて、コンバージョンに近い傾向がある。そのため、サイト上のユーザー体験が悪いと、価値の高い訪問者を失うリスクがある。 \n\n\n\n\n まやかしの指標ではなく、ビジネスへの影響を測定する \n\n\n グーグルは、サードパーティのSEOツールやベンダーを直接評価していない。同様に、それらのツールはグーグルの内部指標にアクセスできない。 \n\n\n\n サードパーティツールが検索やAIに関して提示する「まやかしの指標」にまどわされるのではなく、「リード」「売上」「登録」といった、最終利益にとって重要な成果に注力すべきである。 \n\n\n\n\n 新しいSearch ConsoleとMerchant Centerのレポートが順次展開されている \n\n\n グーグルは、AI検索機能からのインプレッションを示すSearch Consoleレポートを追加している。マーチャントセンターでも、検索上のグーグルの生成AI体験全体で商品がどのように表示されるかをレポートするようになった。 \n\n\n\n これらは、効果的なコンテンツ戦略と技術的SEO戦略による成果を確認するための基準として機能する。 \n\n\n\n ◇◇◇ \n\n\n\n\n\n\n\n 「AI検索時代になっても、本質的なSEOの基盤は変わらない」というのは、グーグルが繰り返し提唱していることだ。小手先のハックではなく、ユーザーに向き合う「一貫した本質的なマーケティング」こそが最大のAI検索の最適化である。 \n\n\n\n\n\n\n\n\n \n ★★★★☆ \n \n すべてのWeb担当者 必見！ \n \n \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n グーグル検索SEO情報① \n\n\n\n\n \n  サードパーティのSEOツール、サービス、アドバイスに関するグーグル公式ガイダンス   \n  どのツール、サービスもグーグル非公式  （グーグル 検索セントラル）  国内情報  \n \n\n\n\n\n グーグルは、サードパーティのSEOツール、サービス、アドバイスの使用に関するガイダンスを公開した。 サードパーティの（つまりグーグルが公式に提供しているわけではない）ツールやサービスを利用する際は、グーグルの公式ガイドラインと照らし合わせて慎重に評価すること を推奨している。 \n\n\n ガイダンスの主なポイントは次のとおりだ： \n\n\n \n   公式ガイドラインでの検証  ―― ネット上にあるサードパーティのSEOアドバイスには誤解が含まれていることもある。そうしたSEOアドバイスに従ってサイトを改修する前に、グーグル公式の SEOガイド や 生成AI向けに最適化するためのガイダンス で事実を確認することが大切だ。  \n   ツールの限界と注意点  ―― サードパーティのツールは、グーグルの内部データにアクセスできないし、順位を保証できない。提供されるデータや予測は、あくまでそのツール独自のものであることを前提とする。  \n   グーグル公認という誤解  ―― グーグルはサードパーティのサービスを評価・承認していない。グーグルによって「容認」または「承認」されていると主張するサービスには注意が必要だ。  \n \n\n\n\n\n\n\n \n    \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n \n \n\n\n\n\n\n 外部のSEOツールのレポートやアドバイスを鵜呑みにせず、グーグル公式情報をもとに判断し、データ収集には信頼できるファーストパーティツールであるSearch Consoleを活用するのが大原則だ。 \n\n\n\n 直接は関係しない話だが、個人的に感じていることがある。サードパーティでの「元グーグル社員」という肩書きには特に注意が必要だということだ。そのアピールをしていても、実際には検索サービスの中心から離れた仕事しかしていなかったということもあり得るからだ（在籍当時の仕事を知っているなら話は別だが）。 \n\n\n\n\n \n ★★★★☆ \n \n サードパーティ製のツールを利用している、すべてのWeb担当者 必見！ \n \n \n\n\n\n\n\n\n\n\n \n  ドメイン名の変更後90日以内に検索トラフィックが回復したサイトはわずか4分の1未満   \n  約14%は3年経過しても完全には回復せず  （SALT.agency）  海外情報  \n \n\n\n\n サイトのドメイン名を変えたら、新しいURLで検索トラフィックが元に戻るまで、どれぐらいかかるものだろうか？ \n\n\n\n 「新しいドメイン名のURLが元のオーガニック検索トラフィックを回復させるまでにどのくらいの時間がかかるか」を、1,052件のウェブサイトのドメイン名移行を対象に調査したデータがある。SALT.agency（ソルト・エージェンシー）が行ったものだ。 \n\n\n\n その結果、 トラフィックの回復は遅く、非常に予測しにくいプロセスである ことが判明した。回復期間の中央値は304日だった。一部のサイトはすぐに回復する一方で、かなりの割合のサイトは1年以上かかり、約14%は3年経過しても完全には回復していない。 \n\n\n 調査結果の主要ポイントは次のとおりだ： \n\n\n \n   回復が早いサイトは4分の1未満  ―― 最初の90日以内にオーガニックトラフィックを回復するサイトは約23%にとどまる。  \n   1年という節目  ―― 1年以内に回復するウェブサイトは60%弱。40%強は12か月を超える期間を要する。  \n   極端に遅いサイト  ―― 平均回復期間は489日である。一部のサイトが極端な遅延に直面しており、13.9%が3年後も完全な回復を示していないため、回復期間の平均値が長めになっている。  \n \n\n\n\n\n \n \n   \n     \n       回復期間 \n       割合 \n       累積割合 \n     \n   \n   \n     \n       0〜30日 \n       5.1% \n       5.1% \n     \n     \n       31〜90日 \n       17.7% \n       22.8% \n     \n     \n       91〜180日 \n       12.6% \n       35.4% \n     \n     \n       181〜365日 \n       24.1% \n       59.5% \n     \n     \n       1〜2年 \n       24% \n       83.5% \n     \n     \n       2年超 \n       16.5% \n     \n   \n \n \n\n\n\n より早くトラフィックを新ドメイン名のURLで獲得するために有効な施策として、SALT.agencyは次のようなものを推奨している： \n\n\n\n \n \n クリーンな技術的設定 \n\t \n\t 正しい301リダイレクトを大規模に実装する \n\t リダイレクトチェーンがない状態にする \n\t 孤立ページがない状態にする \n\t \n \n\n \n より強いドメイン名の権威性 \n\t \n\t 新ドメイン名が移行前に確立された権威性を持っている状態にする、または旧ドメイン名と新ドメイン名の間に密接に関連したブランド関係がある状態にする \n\t \n \n\n \n 移行時のコンテンツ変更を最小限に抑える \n\t \n\t 可能な限りURL構造を維持する \n\t 可能な限りコンテンツを維持する \n\t 可能な限り内部リンク構造を維持する \n\t \n \n\n \n Googlebotによる迅速な再クロール \n\t \n\t 公開後すみやかに更新済みサイトマップを送信する \n\t 公開後すみやかにSearch Consoleの再確認を完了する \n\t \n \n\n \n クロール負荷の管理 \n\t \n\t 移行中は、グーグルが「移行先サイトの新しいURLを発見し、301リダイレクトを処理するために移行元サイトの古いURLを再クロールする」必要があるため、クロール負荷が急増することを理解しておく \n\t グーグルは、クロール容量の上限（サーバーの応答時間とエラー率）とクロール需要（人気度や更新頻度に基づいてグーグルがどの程度クロールしたいか）という2つの要素のバランスを取ることを理解しておく \n\t この期間中のサーバーパフォーマンスは、グーグルがドメイン名の変更をどれだけ迅速に処理するかに直接影響することを理解しておく \n\t \n \n \n\n\n\n\n\n\n なお、サイト移転に関しては、 公式ドキュメントの解説 に忠実に従って実行することが、トラブルを最小限に抑え期間を短縮するためのベストプラクティスだ。 \n\n\n\n\n\n\n\n\n \n ★★★★☆ \n \n SEOがんばってる人用（ふつうの人は気にしなくていい） \n 技術がわかる人に伝えましょう \n \n \n\n\n\n\n\n\n\n\n\n\n\n\n \n  アドレス変更ツールはすべてのサブドメインに対しても使用すること（グーグル推奨）   \n  グーグルの処理を早めるため  （Google検索セントラル）  国内情報  \n \n\n\n\n\n ドメイン名を移転する際には、Search Consoleの アドレス変更ツール を使うようグーグルが推奨している。 \n\n\n\n このツールの使用について、サイト移転ドキュメントに注釈が追加された。 \n\n\n\n\n\n\n   ドメインの移行の場合:  サイトをあるドメインから別のドメインに移行する場合は、すべてのサブドメインと古いドメイン名の www バージョンおよび www なしバージョンについて、これらのバージョンを使用していない場合であっても、 アドレス変更 リクエストを送信してください。これらのバリエーションのすべてについて、Search Console で所有権が確認されているようにしてください。  \n\n\n ※編集部で一部省略 \n\n\n\n\n\n\n\n  最も上位のドメイン名を含む、「すべてのサブドメインに対してアドレス変更を通知するように」 との指示だ。 \n\n\n たとえば、example.comが元のドメイン名で、次のサブドメインでサイトを運用していたとする。 \n\n\n\n 元の状態 \n\n\n \n www.example.com （コーポレートサイト） \n blog.example.com （ブログ） \n shop.example.com （オンラインショップ） \n \n\n\n\n\n この状態で、example .com からexample .co.jp にドメイン名を移転する。この場合、次の4つのパターンでアドレス変更ツールを利用するのだ。 \n\n\n\n アドレス変更ツールでの指示 \n\n\n \n 旧： example.com  新： example.co.jp \n \n 旧： www.example.com  新： www.example.co.jp \n \n 旧： blog.example.com  新： blog.example.co.jp \n \n 旧： shop.example.com  新： shop.example.co.jp \n \n \n\n\n\n\n サブドメインに対してもアドレス変更ツールを実行するというのは、長らくSEOに関わってきた筆者も今までに耳にしたことのない推奨だ。 \n\n\n\n さらにドキュメントで興味深い点がある。古いサブドメインは「これらのバージョンを使用していない場合であっても」アドレス変更リクエストを送るように指示しているのだ。 \n\n\n\n\n 実行しなかったからといって重大な問題が起きるとは思わない。しかし、こうすることが、グーグル側の移転処理を早めることに役立つのかもしれない。 \n\n\n\n\n 1つ前の記事で、ドメイン名の移転後に90日以内に検索トラフィックが回復したサイトはわずか4分の1未満だったことを紹介した。アドレス変更ツールも確実に利用したい。 \n\n\n\n\n\n \n ★★★★☆ \n \n SEOがんばってる人用（ふつうの人は気にしなくていい） \n \n \n\n\n\n\n\n\n\n\n\n\n\n\n \n  2026年6月のGoogle検索オフィスアワー： 重複コンテンツの処理、バックボタンハイジャック、AI 検索に向けた情報発信の方針など   \n  久しぶり！  （#Google検索オフィスアワー on YouTube）  国内情報  \n \n\n\n\n\n 2026年6月のグーグル検索オフィスアワーがYouTubeで公開された。実に3か月ぶりだ（今回から3か月間隔になっている）。 \n\n\n\n あんな氏が回答したのは次の質問だ： \n\n\n\n\n \n \n マークアップでテキストを含む画像の使用（ 6:53 ） \n Google 検索のコア アップデート（ 9:00 ） \n 重複コンテンツの処理（ 11:10 ） \n Discover のインプレッションが急落（ 12:26 ） \n バックボタンハイジャッキング（ 13:52 ） \n 戻るボタンのハイジャック（ 15:48 ） \n Search Console のデータ異常（ 17:47 ） \n 今後の AI 検索に向けた情報発信の方針（ 19:34 ） \n primaryImageOfPage マークアップ（ 22:18 ） \n Search Console データの乖離と正規化の影響（ 23:53 ） \n コンテンツが Index されなくなった（ 27:09 ） \n \n \n\n\n\n\n\n \n  \n \n\n\n\n\n\n\n\n 次回のオフィスアワーは9月を予定している。質問があれば フォーム から送っておこう。 \n\n\n\n\n\n\n \n ★★★☆☆ \n \n SEOがんばってる人用（ふつうの人は気にしなくていい） \n \n \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n  \n グーグル検索SEO情報② \n\n\n\n \n AIレシピ氾濫時代に「本物の料理」を武器に。People Inc.の人間ファースト戦略 \n 先手必勝！ AI Overviewsが動く前に記事を出すUSA Todayの新戦術 \n 「コモディティ」と「非コモディティ」コンテンツの判別方法 \n 「戻るボタンのハイジャック」スパムポリシーが適用スタート、影響は？ \n グーグル、2026年6月のスパムアップデートをリリース \n \n\n\n\n\n 海外SEO情報ブログの掲載記事から \n\n \n Google Search ConsoleのAIパフォーマンスレポート、日本でも提供開始 \n AIの推薦はクリックより強い？ ChatGPTがブランド訪問を2.5倍に増やす \n \n\n  \n\n\n \n\n\n\n\n\n\n\n\n\n\n\n\n この記事の目次：\n \n  今週のピックアップ  \n  グーグル検索SEO情報①  \n  グーグル検索SEO情報②  \n  海外SEO情報ブログの掲載記事から  \n \n \n\n\n\n\n\n\n グーグル検索SEO情報② \n\n\n\n\n\n\n\n\n \n  AIレシピ氾濫時代に「本物の料理」を武器に。People Inc.の人間ファースト戦略   \n  グーグル流入75%消失に巨大テストキッチンで対抗  （The New York Times）  海外情報  \n \n\n\n\n\n ※リンク先はnytimesの購読者限定記事 \n\n\n\n People Inc.（ピープル・インク）は、Food & WineやSouthern Livingなどのブランドを抱える大手デジタル・紙媒体出版社だ。AI生成レシピに対抗するため、 人間主体のフードコンテンツ に賭けている。 \n\n\n People Inc.のウェブサイトへのグーグル検索からのトラフィックは、検索プラットフォームによるAI要約の利用を背景に、 過去4年間で総訪問数の75%から25%に低下した 。こうした状況を受けて、次のことを推進した： \n\n\n\n \n ソーシャルメディア向け動画制作に重点を置く形へと再編した \n すべてのレシピの背後にある人間の専門性のさらなる強化に乗り出した \n \n\n\n\n まず、人間ならではの強みを打ち出した。アラバマ州バーミンガム近郊で40,000平方フィート（サッカー場の約半分の広さ）、28のキッチンを備えた施設を運営している。同施設では、人間のレシピ開発者、フードスタイリスト、写真家によって、年間約1,800件の新レシピが開発され、さらに5,300件のレシピをテストしている。13の写真スタジオと3つの動画スタジオを備え、現在は月に約175本の動画を制作している。 \n\n\n\n\n \n    \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n \n \n\n\n\n\n\n\n 多角化戦略も検索トラフィック急減への対抗策だ。インスタグラム、Apple News、YouTubeなどのプラットフォームで新たなオーディエンスを構築し、イベント、スポンサーシップ、ライセンス契約を通じて別の収益源を見いだす取り組みを進めている。無料のレシピ保存ツールであるMyRecipesは、現在300万人以上のユーザーを抱えている。People Inc.はまた、テキサス州オースティンで毎年開催されるフード＆音楽フェスティバルHot Luckの買収も発表した。 \n\n\n\n People Inc.は、AIの普及に対抗しているが、利用そのものを否定しているわけではない。むしろAIを活用している。OpenAIとライセンス契約を結んでおり、ソーシャルメディアの監視や食材価格の見積もりなど、調査や業務効率化のためにAIを活用している。 \n\n\n\n ただし、いずれのブランドにおいても、執筆、編集、ビジュアル、その他のクリエイティブ業務にはAIを使用していない。「人間味」を打ち出す戦略は先に触れたとおりだ。 \n\n\n\n 財政面では、2021年以降、約1,000人の従業員を削減している。主な要因は紙の雑誌タイトルを14誌から7誌へ半減させたことにある。一方で、デジタル収益は10四半期連続で成長していると報告している。 \n\n\n このように、People Inc.は、人間が作成するフードコンテンツの高い価値によって差別化を図り、AI生成コンテンツがますますあふれる環境の中で、実世界での厳密なレシピ開発を通じて読者の信頼を築いている。 \n\n\n People Inc.は超大手ブランドなので、こうした戦略は簡単には真似できないと思うかもしれない。本当にそうだろうか？ 人間ならではのコンテンツや、実体験に基づく一次情報の提供、検索以外のメディアでのアプローチなどは、規模は違ったとしても不可能なことでは全然ない。 \n\n\n\n\n\n \n ★★★★★ \n \n すべてのWeb担当者 必見！ \n \n \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n \n  先手必勝！ AI Overviewsが動く前に記事を出すUSA Todayの新戦術   \n  AIを活用したスピードでAIに挑む  （DIGIDAY）  海外情報  \n \n\n\n\n\n People Inc.は、AI検索によるトラフィック減少に「人間味」で対抗していた。一方、米国の大手パブリッシャーであるUSA Today（USAトゥデイ）は、「速報性」で対抗している。 \n\n\n\n USA Todayは、2026年FIFAワールドカップの速報ニュースを迅速に公開するために、AI支援による事前作成済みの「シェルファイル」を導入している。これは、グーグルのAI Overviewsが要約を生成する前の限られた時間にコンテンツを作成して急増する初期の検索トラフィックを取り込む戦略だ。 \n\n\n 同社は、過去の報道からアーカイブされた小見出し、写真、リンクを組み込んだ「自動化シェルファイル」を作成している。ニュースが発生すると、編集者は数行を追加し、見出しを調整して即座にコンテンツを公開する。ゼロから文脈を組み立てる必要はない。要は「記事テンプレ」のようなもので、特にスポーツニュースの速報記事はある程度のパターンが決まっている。必要な部分だけを試合状況に合わせて編集するのだ。 \n\n\n\n ニュースルームは、ワールドカップ報道用に1日あたり5本のシェルファイルを準備しているそうだ。 \n\n\n\n 何らかの出来事（たとえば試合）があってから、その情報がグーグルのAI検索機能であるAI Overviews（AIによる概要）とAI Modeに出るまでには、タイムラグが多少なりともある。USA Todayのシェルファイル戦略は、その「AIが情報をだせるようになるまでの間」の検索需要を取り込むよう設計されている。つまり、先手を打つのだ。 \n\n\n このアプローチは2026年冬季オリンピックで試験導入され、実証済みの実績を持つ。USA Todayの全ネットワークは1月1日から2月28日までに合計1億1600万ページビューを生み出した。主力媒体だけでも9100万ページビューを獲得した。これは、2022年冬季オリンピックから82%の増加だ。 \n\n\n さらに、最初に公開することで、グーグルニュースにおいて大元の情報源として扱われることが多くなり、他のパブリッシャーがリンクを張るきっかけになる。この引用パターンはオーガニック検索順位を強化し、AI Overviewsは基盤となる検索結果を参照するため、同じ優位性がAI検索機能にも及ぶ可能性があるという。 \n\n\n スピードに加えて、USA Todayは人間中心のアプローチも疎かにすることなく、従来型のSEOにも投資している。全16開催都市に配置された記者、現地の報道ハブ、2つの専用ニュースレター、そしてポッドキャストである。人間の手による編集で、一般的なAI出力では容易に再現できない、署名記事を軸とした視点豊かなジャーナリズムを補完策としている。 \n\n\n まとめると、USA Todayは、人間のワークフローを加速することでAI検索の要約に対抗している。ニュースパブリッシャーにとって、自動化された検索回答に対する最良の防御策は、圧倒的なスピードと、現場に根ざした独自報道を組み合わせることのようだ。 \n\n\n\n\n\n\n \n ★★★★☆ \n \n ニュースサイトのすべてのWeb担当者 必見！ \n \n \n\n\n\n\n\n\n\n \n  「コモディティ」と「非コモディティ」コンテンツの判別方法   \n  ユーザーに直接聞けばいい  （Mark Williams-Cook on LinkedIn）  海外情報  \n \n\n\n\n\n グーグルが公開している「 生成AI検索最適化のベストプラクティス 」では、 ありきたりでない価値・独自性のある 「非コモディティ」コンテンツの作成を推奨  している。 \n\n\n では、コンテンツが「コモディティ」なのか「非コモディティ」なのかの判別は、どのようにすればいいのだろうか？ \n\n\n\n AlsoAskedというSEOツールを展開するSEO専門家のマーク・ウィリアムズ＝クック氏は次のようにアドバイスする。 \n\n\n\n\n\n\n\n\n \n 「これは非コモディティコンテンツなのか」という議論を社内でまとめるのは難しいことがありますが、それを解決する良い方法は、（驚くなかれ）データです  \n\n\n 最も基本的な指標は簡単に設定でき、ユーザーがどう考えているかを把握できます。 自分が関わって作ったものについては、どうしてもバイアスがかかってしまうものなので、データ主導のアプローチを取りましょう 。 \n\n \n    \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n \n ※Web担編注　投稿の画像より。左が「サイト管理者の考えるコンテンツの姿」、右が「読者の感じるコンテンツの姿」 \n \n\n\n コンテンツが良いかどうかを推測するために、直帰率、ページ滞在時間、エンゲージメント率など、抽象的な方法がいろいろ使われているのを見てきました。でも…… \n\n\n  ユーザーに直接聞いてみたことはありますか？  \n\n\n たとえば、情報提供型のコンテンツを作っているなら、各ページの下部にシンプルに次のようなボタンを置きます。 \n\n\n 「この記事は役に立ちましたか？ 👍👎」 \n\n\n そして、これをGoogleアナリティクスに連携します。 \n\n\n もちろん、そこにも多少のバイアスはあります（人はポジティブな反応よりもネガティブな反応のほうが多くなりがちです）。ただし、それは全体に同じように適用されるため、比較するための十分な基準になります。 \n\n\n コンテンツ改善に取り組む必要がある場合は、低評価が多い外れ値から着手するための優れたデータポイントが得られます。そこで、次のように問いかけることができます： \n\n\n \n なぜこのコンテンツはユーザーの期待を満たしていないのか？ \n 重要な情報が抜けていないか？（AlsoAskedは確認しましたよね？） \n 現在の情報の見せ方が悪いのか？ \n 提供された内容が単に気に入らなかったのか？ \n \n\n\n もちろん、そこからさらに定性的な評価を行うこともできますが、このデータを最初から収集することに、文字どおりデメリットはありません。 \n \n\n\n\n\n\n \n  \n \n\n\n\n\n\n 要は、記事下に次のような要素を設置し、GAで計測するというのだ。 \n\n\n\n\n\n\n \n    \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n \n \n\n\n\n\n \n    \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n \n ※具体的なフィードバックを任意で送信してもらうのもいい \n \n\n\n\n\n\n\n クック氏が指摘するように完璧ではない。しかし、コモディティ・非コモディティの判別とコンテンツ改善のヒントとしての利用価値はありそうだ。 \n\n\n\n\n\n\n\n\n \n ★★★★☆ \n \n SEOがんばってる人用（ふつうの人は気にしなくていい） \n \n \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n \n  「戻るボタンのハイジャック」スパムポリシーが適用スタート、影響は？   \n  まったく確認されていない  （Glenn Gabe on X）  海外情報  \n \n\n\n\n\n グーグルは、「 戻るボタンのハイジャック 」をスパムに関するポリシーの「悪意のある行為」に適用するとしていて、その開始日が2026年6月15日だった。適用開始から半月が経過したが、状況はどうなのだろうか？ \n\n\n\n 驚くべきことにと表現していいのだろうか、まったくと言っていいほど変化がないようだ。常日頃から多くのサイトをモニタリングしている、グレン・ゲイブ氏は次のように状況を伝えている。 \n\n\n まず、適用された 翌日 の報告だ。 \n\n\n\n\n\n\n  「戻るボタンのハイジャック」に関しては、まったく静かな状況だ。手動による対策は一切確認しておらず、それを受けたサイトがあるとも聞いていない。私が確認できる限り、まったく話題にもなっていない。また、現在では私のリストにあるサイトのうち、戻るボタンをハイジャックしているサイトは1つもない。つまり、すべてのサイトが6/15の期限前にハイジャックをやめたということだ。引き続き注意深く見守るが、今のところ何もない。  \n\n\n\n\n\n \n \n All quiet on the 'back button hijacking' front. I haven't seen any manual actions, I haven't heard of a site receiving one, and there is no chatter at all from what I can see. Also, now NONE of the sites on my list are hijacking the back button anymore. So all of them stopped…  pic.twitter.com/FZfKauqpBT  — Glenn Gabe (@glenngabe)  June 17, 2026 \n    \n \n\n\n\n  その4日後 の報告だ。 \n\n\n\n\n\n\n  「戻るボタンのハイジャック」に関しては、依然としてまったく静かな状況だ。戻るボタンをハイジャックしていた多くのサイトが現在ではそれをやめていると考えているため、手動による対策への懸念がウェブ全体で大きな変化をもたらした可能性がある。手動による対策の兆候は（まだ）確認しておらず、私のデータでは、以前戻るボタンをハイジャックしていて私が追跡していたサイトはすべて、現在はハイジャックしていない。引き続き注視するが、現時点で報告することは何もない。  \n\n\n\n\n\n \n \n Still all quiet on the 'back button hijacking' front. I believe many sites that were hijacking the back button have now stopped, so it's possible that the fear of a manual action yielded a ton of change across the web. I haven't seen any signs of manual actions (yet) and my data…  https://t.co/u0N8oigaPE   pic.twitter.com/MkyYtuYntx  — Glenn Gabe (@glenngabe)  June 21, 2026 \n \n \n\n\n\n\n\n 2か月の猶予期間があったため、どのサイトも対処を完了したということだろうか。実際にはほとんどのサイトで「何らかの広告サービスが提供する機能」を使っていて、それらのサービスが6月15日の時点で機能を停止したのだろうと想像される。 \n\n\n\n もしかすると、「戻るボタンのハイジャック」に対してはアルゴリズムによって自動でも対処もするとのことだったので、現状では手動による対策は実行せずに自動処理のみなのかもしれない（その場合でも、気付かないほどに影響が小さいのかもしれない）。 \n\n\n\n\n いずれにしても、影響が報告されていないからといって戻るボタンの正規の挙動を乗っ取る仕掛けは禁物だ。そもそも、ユーザー体験を悪化させる邪悪な仕組みなのだから。 \n\n\n\n\n\n \n ★★★☆☆ \n \n SEOがんばってる人用（ふつうの人は気にしなくていい） \n \n \n\n\n\n\n\n\n\n\n\n\n\n\n \n  グーグル、2026年6月のスパムアップデートをリリース   \n  検索結果に変化は起きたのか？  （Google Search Status Dashboard）  海外情報  \n \n\n\n\n\n グーグルは、2026年6月24日（太平洋時間）に 2026年6月のスパムアップデート をリリースした。展開は6月26日（同時間）に完了している。特定のスパムをターゲットにしたものではなく、 通常のアップデートとのこと である。 \n\n\n 米国のSEOコンサルタントであるグレン・ゲイブ氏は、このスパムアップデート前後のランキング変動を 次のように観測 している。 \n\n\n\n\n\n\n  \n   6月の大きな変動  ―― 過去数週間、検索での露出に激しい変動があり、6月12日と6月18日が大規模なトラフィック減少と急増の主要な日付として際立っている。6月25〜26日にかけても最近の動きが観測された。  \n   テストかロールアウトか  ―― この極端な変動が、公式の6月スパムアップデートが実環境で積極的にテストされていることによるものなのか、それとも別の基礎的なアルゴリズム要因によるものなのかは、依然として不明である。  \n   AIによる大量生成コンテンツへの影響  ―― リスクの高い手法や、「 Mt. AI（AI山） 」と呼ぶAI検索向けのスパム行為を大々的に実践しているサイトは、深刻な調整を受けている。一部は5月のコアアップデート前または期間中に一時的な急増を見せたが、6月のこの変動で大きく下落している。  \n   コアアップデートによる影響の重なり  ―― 分析された複数のサイトは、まず5月のコアアップデートの影響を受け、その後6月中旬の変動で追加の打撃を受けた。これには、多くの主要クエリで実質的に姿を消した著名なクーポンサイトも含まれる。  \n   例外と急増  ―― スパム色の強い多くのサイトが下落する一方で、予想外のドメイン名が大幅に上昇した例もある。注目すべき例はGrokipedia（グロキペディア）で、露出が大きく急上昇した。しかし、その成長が持続可能かどうかには疑問が残る。  \n  \n\n\n\n\n\n \n \n Good Morning Google Land! This is the 6/25 edition of \"Spam Update Notes\". It's the sister show to \"Core Update Notes\". :) Anyway, I ran the visibility reporting for nearly 2K sites that have been previously impacted by spam updates, plus a number of sites that are currently…  pic.twitter.com/5joRPeSJy4  — Glenn Gabe (@glenngabe)  June 25, 2026 \n    \n \n\n\n\n\n\n グーグル公式のガイドラインに従ってSEOを施策していればスパムアップデートで悪影響を受けることはない。むしろ、スパムサイトが検索結果から排除されて恩恵を得られることを期待したい。 \n\n\n\n\n\n\n \n ★★☆☆☆ \n \n SEOがんばってる人用（ふつうの人は気にしなくていい） \n \n \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n     海外SEO情報ブログの 掲載記事からピックアップ  \n\n\n\n\n SCのAIパフォーマンスレポートの提供拡大と、ChatGPTによるブランド言及調査をピックアップ \n\n\n\n\n \n\n\n \n Google Search ConsoleのAIパフォーマンスレポート、日本でも提供開始 \n 早く使ってみたい！ \n \n ★★★★★ \n \n SEOがんばってる人用（ふつうの人は気にしなくていい） \n \n \n \n\n\n \n AIの推薦はクリックより強い？ ChatGPTがブランド訪問を2.5倍に増やす \n 調査方法に問題点はあれど身に覚えはある \n \n ★★★★☆ \n \n SEOがんばってる人用（ふつうの人は気にしなくていい） \n \n \n \n\n\n\n\n \n \n       \n \n この記事の筆者 \n\n\n \n                       \n                                                 \n                          \n                   \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n \n \n      \n                         \n                                                 \n                           \n                             \n                                                             [ 執筆 ] \n                                                              鈴木 謙一 \n \n                                                           \n                                                          \n                                                       \n                                                   \n                       \n                       \n                        \n             \n  鈴木 謙一（すずき　けんいち）  \n 「海外SEO情報ブログ」の運営者。株式会社Faber Companyの執行役員（Search Advocate）。 \n 海外SEO情報ブログは、SEOに特化した日本ではもっとも有名なSEO系ブログの1つ。米国発の最新のSEO情報を中心に、コンバージョン率アップやユーザーエクスペリエンス最適化のための施策も取り上げている。 \n 正しいSEOをウェブ担当者に習得してもらうために、ブログでの情報発信に加えて所属先のFaber Companyでは、セミナー講師や講演スピーカーを主たる役割にしている。  \n      \n                       \n                       \n                          鈴木 謙一 \nのプロフィールを見る", "author": "Web担当者Forum", "published_at": "2026-07-02T22:05:00+00:00", "category": "AI広告・生成AI活用・マーケティング・SEO", "importance": "S", "summary": "AI検索時代におけるSEO戦略について、Google検索&コマース グローバル広告ソリューション担当VPが解説。優れたSEOは優れたAI検索戦略であり、バズワードに踊らされず基礎的なSEOへの投資が重要。人間向けのコンテンツ作成、自社ブランド独自のコンテンツ、ウェブサイトの技術的最適化、ビジネス成果の測定が成功の鍵となる。", "points": ["AI検索は従来の検索と同じランキングシステムに依存しており、基礎的なSEOがしっかりしていればAI検索でも有利な位置にある", "GEO、AEO、LLM SEOなどのバズワードに惑わされず、一次体験・専門家の洞察・独自の視点を含む『コモディティではないコンテンツ』の作成が競争優位性になる", "Search ConsoleやMerchant Centerの新レポートを活用し、リード・売上・登録などビジネスへの直接的な影響を測定することが重要"], "metrics": {}, "id": "490953b81d531fdd"}, {"source": "blog", "title": "OpenAI、ChatGPTでの広告テストを日本含む5ヵ国へ拡大 回答の独立性は維持", "url": "https://news.google.com/rss/articles/CBMiT0FVX3lxTE5wS0NWamV6aF82N0Q4dnVzczg0S3JONkszUjF4bW5zZVN2QTItM3MxSFZ6S3ZrR1ZpcFB4eDJTMXVieXhnMXhXQzM1dFRYdnc?oc=5", "text": "OpenAI、ChatGPTでの広告テストを日本含む5ヵ国へ拡大 回答の独立性は維持：commercezine    MarkeZine", "author": "Google News: ChatGPT広告", "published_at": "2026-07-04T22:25:37+00:00", "category": "生成AI活用・GPT広告", "importance": "S", "summary": "OpenAIがChatGPTにおける広告テストを日本を含む5ヵ国に拡大することを発表した。この施策により、ChatGPTのユーザーに対して広告配信が開始される見込み。重要な点として、広告配信の拡大にもかかわらず、ChatGPTの回答の独立性と信頼性は維持されることが強調されている。", "points": ["ChatGPT広告テストが日本を含む5ヵ国に拡大され、新たな広告配信市場が形成される", "生成AI活用による新しい広告プラットフォームとしてのChatGPTの位置付けが進行中", "ユーザーの信頼維持のため、回答の独立性を保証する仕組みが導入されている"], "metrics": {}, "id": "eed0a4536ca9e2d9"}, {"source": "blog", "title": "SEOは「キーワード検索」から「意思決定エンジン」へ、AI検索がもたらす10の変化（前編）", "url": "https://webtan.impress.co.jp/e/2026/07/06/52884", "text": "AI検索の登場で何が変わったのか？ AIに関して正しておくべき誤解とは？ 自社がAI検索に備えられているかを評価するには、どうすればいいのか？ \n SEOでは、長らく「検索結果からいかに自サイトへのクリックを獲得するか」が課題だった。表示回数もメタデータも、基本的にはクリックを増やす材料だった。しかし、AI検索はSEOの戦場を「クリックの前」に変えてきている。 \n 長年、SEOの成果は説明しやすかった。そのプロセスの多くが目に見えるもので、次のような流れだった： \n \n  ユーザーが検索し、  \n  結果を見て、  \n  ページをクリックし、  \n  うまくいけばコンバージョンに至る  \n \n しかしAI検索の登場で、これが難しくなっている。ユーザーは今や、次のような流れで検索している：  \n \n  複数の条件を含む詳細な質問をし、  \n  AIがまとめた回答を得て、  \n  選択肢を比較し、  \n  優先順位を決めてから、  \n  検索結果をクリックする  \n \n クリックが重要でなくなったわけではないが、 クリックの前、つまりAIが生成する回答の中でもSEOの効果が発揮されるようになっている ということは理解しておきたい。 \n クリック前の段階では、次のようなことが起きている可能性がある： \n \n ブランドについて言及されたり、 \n 引用されたり、 \n 推奨されたり、 \n 誤って伝えられたり、 \n 無視されたりする \n \n この記事では、次の3つについて、私の見解を紹介する： \n \n AI検索と最適化に関する、正しておきたい誤解 \n AI検索の最適化に影響を与える10の変化 \n 自分のブランドがAI検索に対する備えができているかを評価する方法 \n \n まず、いくつかの 誤解 について触れてから、 AI検索の登場で変わった10の点 を解説していく。 \n \n AI検索と最適化に関する、正しておきたい誤解 \n \n 誤解を正す1 AI検索は従来の検索に取って代わるものではない \n 現在、私たちの業界で最大のリスクの1つは、AI検索に過剰反応することだ。次のように極端にふるまう人たちがいるが、どちらの見方も役に立たない： \n \n 「従来のSEOを不要にするもの」としてAI検索を捉える \n 「意味のある変化は何も起きていない」かのように振る舞う \n \n  AI検索は従来の検索に取って代わるものではない （リンク先は日本語記事）。AI検索は 検索ジャーニーを拡張するもの だ。そのため、AI検索に対してもSEOの基本的な施策は依然として重要だ： \n \n クロール可能性 \n インデックス可能性 \n 技術的な明確さ \n 有用なコンテンツ など \n \n グーグルによると、グーグル検索の生成AI機能はコアとなる「検索順位決定システム」と「品質システム」が元になっているため、 基本的なSEOのベストプラクティスは引き続き有効 だという。LLM（大規模言語モデル）は、学習中に取得した情報だけで機能するわけではない。AIシステムは必要に応じてリアルタイムに情報を調べて最新の回答を生成することもある。その際にAIシステムが利用するのが、次のような技術だ： \n \n 情報検索 \n グラウンディング \n ウェブ検索 \n その他の外部データソースを利用する \n \n そう。AI検索は最新の情報を考慮するために、既存の検索を裏で活用しているのだ。だからこそ、従来のSEOは依然として重要だ。ページにアクセスできなかったり、オーソリティ（権威性）が低かったりすれば、AIシステムが信頼して利用できるシグナルは少なくなる。 \n 「AI検索」が「既存の検索」と違っているポイントは、次の3つだ： \n \n 表面的な部分 \n 動作 \n 測定の仕方 \n \n こうした変化によって、最適化すべき対象も変わってくる。今では検索順位やクリック数だけでなく、次のことも最適化の対象とする必要がある： \n \n AI生成の回答内でブランドの情報が取得され、 \n 正確に記述され、 \n 引用され・リンクされ、 \n 推奨され、 \n 比較され、 \n 選択されるかどうか \n \n \n 誤解を正す2 従来の検索とAI検索に関する最大の誤解 \n 私の会社 SEOFOMOのオーガニック検索トレンド調査 では、 根強く残る誤解 がいくつか明らかになっているため、具体論に入る前に確認しておきたい。 \n    \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n \n だからこそ、 AI検索最適化 は 「SEOの代替」や「裏技で成り立つ孤立した分野」 だと考えるべき ではない 。むしろ 「検索最適化の進化形」 だと捉えるべきだ。 \n SEOの基本に立脚しながらも、次のようなものを考慮して拡張されたものと考えよう： \n \n 統合された回答 \n  クエリファンアウト  \n ブランド表現 \n サイテーション \n クリック前の影響力 など \n \n \n 誤解を正す3 エージェント型フローがもたらす新たな課題 \n この項目に関しては、「誤解」というよりも「見落としがちな点」というほうが正しいかもしれない。 \n 意思決定や取引がどこで行われるかにも注目すべきだ。AIシステムは現在「調査」「比較」「絞り込み」の段階に影響を与えることが多いが、最終的なコンバージョンは依然としてブランドのウェブサイト上で行われている。 \n しかし、ショッピングにおいては、AIや検索プラットフォームが商品の発見やレコメンデーション、 場合によっては購入完了までをAIインターフェイスに近づける コマース機能を導入しており、状況はすでに変わりつつある。 \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  出典： Profound   \n ChatGPTやグーグルのAI Modeはすでに eコマース連携機能を導入しており 、これにはプラットフォーム上でのコンバージョンを促すエージェント型チェックアウトが含まれる。 \n SEO担当者にとって、これはビジビリティと測定の新たな課題となる。「サイトを訪れる前のユーザーの意思決定」にAIが影響を与えるのであれば、クリックする動機が失われ、コンバージョンが発生する場所が変わってしまうからだ。 \n トラフィックは依然として有用なシグナルではあるが、AI検索のパフォーマンスを完全に測定できるものではない。 \n AI検索の最適化に影響を与える10の変化 \n ここからは、私が目にしている主な変化と、それらが最適化に及ぼす影響を紹介していく。 \n \n 変化1 「決定論的なクリック」から「確率論的なクリック」に移行している \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n 従来のSEOは 検索順位やクリック数 などの指標に依存していたが、AI検索では回答内でユーザージャーニーを展開できるようになる。システムは、ユーザーがリンクをクリックする前に選択肢を要約し、ソースを引用し、ブランドを推奨できる。 \n これにより、AIはサイトへの訪問を促さずに意思決定に影響を与えられるため、クリック数を予測しにくくなる。 \n AI検索最適化では、「検索順位」「トラフィック」「直接アトリビューション可能なコンバージョン」だけでなく、次の3つに重点を置くべきだ： \n \n  ブランドのビジビリティ  \n サイテーション（言及） \n 正確な表現 \n \n \n 変化2 AI検索は今や「パフォーマンス」と「ブランディング」のチャネルとなっている \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n ChatGPTやGeminiのようなプラットフォームでのAIによるレコメンデーションは、 すぐにクリックされることはなくても、ブランドの想起や好みに影響を与える 。 \n AIによる「誤情報」や「情報の欠落」があれば、それはビジビリティの問題につながる。ページレベルの最適化だけでは解決できないため、ブランドの表現が優先事項となる。 \n AI検索のワークフローのなかで、次の3つに重点を置き、自分のブランドがどのように表現されているかを観察しよう： \n \n 正確性 \n 感情 \n 第三者による検証 \n \n \n 変化3 会話形式のプロンプトは、従来のキーワードより予測しにくい \n 従来の キーワード調査 と異なり、AI検索の動作ははるかに「動的で」「コンテキストに依存する」ものだ。ユーザーは短いぶつ切りのキーワードだけで検索するわけではない。次のようなものを組み合わせた、より長く具体的な質問をするようになっている： \n \n ニーズ \n 条件 \n 比較 \n 好み \n 後続の質問 \n \n たとえば、ユーザーは「履きやすいジーンズ」ではなく、次のように検索するかもしれない。 \n  アウトドア活動に向いていて、硬すぎない生地感の履きやすいジーンズは？  \n こうしたプロンプトは予測が難しいだけでなく、他の要素によって変わることもある。たとえば次のようなものがプロンプトに影響を与える： \n \n ユーザーのニーズ \n それまでのコンテキスト \n 再質問かどうか \n \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  画像出典： Moz LLM Prompt Suggestions ツール  \n だからこそ、 AI検索のビジビリティを評価 する際に、 個々のさまざまなプロンプトを追跡しようとするべきではない 。 \n 代わりに、次の項目にそってプロンプトをグループ化して分析すれば、はるかに役立つ： \n \n トピック \n 意図 \n 製品 \n サービスライン \n カスタマージャーニーの段階 \n 購入者が選択肢を評価する際に実際に用いる条件 \n \n これにより、重要なプロンプト群全体で、自分のブランド、製品、ページが一貫して表示され、正確に記述され、引用され、推奨されているかどうかを把握しやすくなる。 \n AI検索に 最適化 する際にも、個々のプロンプトを対象にするべきではない。こうしたコンテキストを切り捨てることになってしまうからだ。 \n 代わりに、カスタマージャーニー全体を通じて、自分の製品やサービスに関する トピックレベルでのオーソリティ（権威性）を構築しよう 。 \n \n 変化4 検索システムは、情報を取得するシステムではなく、意思決定エンジンとしての役割が強まっている \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n  従来の検索 では通常、多くの結果が返され、それを ユーザーが評価 していた。AI検索はさらに一歩進んで、「情報を統合し、選択肢を比較し、より絞り込まれた選択肢を推奨する」ことが多い。 \n とはいえ、AIシステムが常にユーザーに代わって「決定」するわけではないし、情報検索の重要性がなくなったわけでもない。情報検索は依然として重要だが、そのインターフェイスはより意思決定を支援するものになる傾向が強まっている。 \n 最適化を図るには、「なぜ自分のブランドが特定のユースケースや比較に適しているのか」を AIシステムが理解できるようにコンテンツを作成しよう 。 \n \n 変化5 パーソナライゼーションは「セグメントレベル」から「個人レベル」に移行している \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n AI検索のユーザー体験は一様ではなく、人によって異なる。具体的には、次のような要素の影響を受ける： \n \n プラットフォーム \n 場所 \n 言語 \n セッションのコンテキスト \n \n グーグルも、「ユーザーがパーソナライゼーションを有効にすれば、AI Modeは過去の検索履歴に基づいてよりパーソナライズされた結果になる」と 説明している 。 \n AIの回答を「検索順位が固定された結果」と見なしてはいけない。2人のユーザーが同じ質問をした場合でも、コンテキストによってそれぞれの結果が異なることもある。 \n  プロンプトの追跡 は、検索順位の追跡ではなくサンプリングと考えよう。1つの結果に過剰反応するのではなく、次のようなパターンを追跡することだ： \n \n トピック \n プラットフォーム \n ジャーニーの各段階 \n \n \n 変化6 プロンプトがサブクエリに分解されると、クエリからページへのターゲティングは機能しなくなる \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n AI検索は、クエリを特定のページにマッピングするわけではない。会話形式のプロンプトには、次のような複数のサブニーズが暗示されている場合がある： \n \n 定義 \n 比較 \n 価格情報など \n \n 最適化を図るには、 トピックレベルのオーソリティ（権威性） を構築し、情報を抽出しやすくして、内容の薄いセクションや JavaScriptを多用したセクション に埋もれないようにする必要がある。 \n \n 変化7 検索と購入のジャーニーは連続的でステートフル \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n 従来の検索とは異なり、AIシステムは1回のセッションの中で連続して検索できる。ユーザーは新たな検索を始めなくても、広範な情報収集をしたあとに購入決定へと移行するような動きもできる。 \n 最初のクエリだけでなく、認知から購入後までの ジャーニー全体をサポート するコンテンツを構築しよう。 \n これは、ユーザーが選択肢を比較したうえで行動を起こす次のような分野で特に重要だ： \n \n eコマース \n SaaS \n 旅行 \n 金融 \n ヘルスケア \n \n \n 変化8 ブランドの信頼性とオーソリティは、システムレベルのフィルターとして機能する \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n AIシステムはオウンドコンテンツを利用できるが、次のような第三者のソースから情報を抽出し、統合することもできる： \n \n メディア報道 \n レビューサイト \n ソーシャルプラットフォーム \n \n つまり、AIでのビジビリティは、次のようなブランドオーソリティと重なるシグナルによって形成されるということだ： \n \n エンティティの認知度 \n 信頼できるメンション \n 裏付け など \n \n 自分のウェブサイトで自分のことをどう説明しているかだけでなく、 信頼できる外部ソースがその情報を裏付けているかどうかが、成否を左右する 。 \n AI検索では、次のようなものの連携を強化しなければならなくなった： \n \n SEO \n  デジタルPR  \n ブランド \n ソーシャル \n コミュニティ \n レピュテーション管理 \n \n \n 変化9 一部の取引は、AI検索インターフェイスに組み込まれつつある \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n eコマースでは、発見から購入までの流れがAIインターフェイスに近づいている。OpenAIは、対象となるEtsyおよびShopifyの出店者向けのChatGPTでInstant Checkout（即時決済）機能を導入した。 \n 一方、グーグルはAI ModeとGeminiアプリで、対象となる米国の小売業者向けにUCP（ユニバーサルコマースプロトコル）を活用したチェックアウト機能を発表した。まだ限定的な導入であり、ユニバーサル（普遍的）なeコマースフローではない。 \n eコマースサイトにとって、 マシンリーダブル（機械判読可能）な商品データ の重要性はさらに高まっている。次の内容は、ウェブ全体で正確かつ一貫している必要がある： \n \n 属性 \n 価格 \n 在庫状況 \n 配送 \n 返品 \n 販売者のポリシー \n \n \n 変化10 一部のAIプラットフォームはJavaScriptのレンダリングに苦慮している \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  出典： YouTubeのTech SEO Connect   \n すべてのAIクローラーがGooglebotのように動作するわけではない。グーグルはJavaScriptを多用するサイトのレンダリング能力を大幅に改善させたが、他のAIクローラーや検索システムには同様の機能がないこともある。 \n JavaScriptを多用するコンテンツは情報検索の点でリスクがあるため、重要な情報はできる限りクロール可能なHTMLでレンダリングされるようにしよう。 \n \n この記事は、前後編の2回に分けてお届けする。AI検索がもたらす変化と影響について述べた今回に続いて、後編となる次回は「AI検索のパフォーマンスと相関性がある10のブランド特性」「AI検索対応チェックリスト」「スコアを解釈して優先順位を付ける方法」について説明する。 \n （後編は7/13公開予定） \n \n \n       \n \n この記事の筆者 \n \n                       \n                                                 \n                           \n                             \n                                                             [ 執筆 ]  \n                                                             Aleyda Solis \n                                                           \n                                                       \n                                                   \n                       \n                       \n                        \n この記事は、 Moz Blog  に掲載された以下の記事を、Mozの許諾を得て日本語化したものです。 \n   \n 原文： 「 The New Rules of AI Visibility and How To Prepare for It 」 by Aleyda Solis （2026/05/21） \n 記事セレクション： 渡辺隆広  翻訳： 株式会社ガリレオ", "author": "Web担当者Forum", "published_at": "2026-07-05T22:05:00+00:00", "category": "SEO/AI検索最適化/マーケティング", "importance": "S", "summary": "AI検索の登場により、SEOの最適化対象がクリック獲得から「クリック前」のAI生成回答内でのブランド表現へシフトしている。従来のSEOは依然として重要だが、AI検索最適化は検索ジャーニーの拡張として捉えるべき進化形である。ブランドビジビリティ、サイテーション、正確な表現が新たな重要指標となり、会話形式のプロンプトに対応したトピックレベルのオーソリティ構築が求められる。", "points": ["AI検索では従来のSEO基本施策（クロール可能性、インデックス可能性、有用なコンテンツ）が依然有効であり、AI検索は既存検索を裏で活用している", "最適化対象が検索順位・クリック数から、AI回答内でのブランド言及・引用・推奨・正確性・比較表示へ拡大し、クリック前の影響力が重要になる", "個別プロンプト追跡ではなく、トピック・意図・カスタマージャーニー段階でプロンプトをグループ化し、トピックレベルのオーソリティ構築が必須"], "metrics": {}, "id": "d36f833ebbee4376"}, {"source": "blog", "title": "生活者に届く前に勝負が決まる！？ ──AI検索（AIO）時代にブランドが取るべき最適化の全体像", "url": "https://www.advertimes.com/20260706/article547946/?utm_source=feed", "text": "AIは生活者の情報収集、購買行動を大きく変えていこうとしています。本連載では、主に購買行動に焦点を当てて、AIによる生活者変化を捉えていきます。前回は、『4人に1人は「AIショッパー」の時代へ――\"買う\"を委ねる消費者、それでも残る\"買物\"の体験価値とは？』をテーマに記事を公開。今回は、「AI検索時代の『AIO対策』」をテーマに博報堂買物研究所 副所長の飯島拓海氏が、Hakuhodo DY ONE ONE-AIO Lab 所長 登 章良氏に最新のトレンドを聞きました。 \n The post  生活者に届く前     const state = { query: "", source: "", importance: "", sort: "date" };
    const labels = { youtube: "YouTube", blog: "Web記事", newsletter: "ニュースレター" };
    const generated = document.getElementById("generated");
    const query = document.getElementById("query");
    const source = document.getElementById("source");
    const importance = document.getElementById("importance");
    const sort = document.getElementById("sort");
    const itemsEl = document.getElementById("items");
    const statsEl = document.getElementById("stats");
    generated.textContent = `更新: ${new Date(DATA.generatedAt).toLocaleString("ja-JP")}`;

    [...new Set(DATA.items.map((item) => item.source).filter((name) => name !== "x"))].forEach((name) => {
      const option = document.createElement("option");
      option.value = name;
      option.textContent = labels[name] || name;
      source.appendChild(option);
    });

    function matches(item) {
      const haystack = `${item.title} ${item.summary} ${item.text} ${item.category}`.toLowerCase();
      return (!state.query || haystack.includes(state.query.toLowerCase()))
        && (!state.source || item.source === state.source)
        && (!state.importance || item.importance === state.importance);
    }

    function renderStats(items) {
      const counts = {
        total: items.length,
        youtube: items.filter((item) => item.source === "youtube").length,
        blog: items.filter((item) => item.source === "blog").length,
        high: items.filter((item) => ["S", "A"].includes(item.importance)).length,
      };
      statsEl.innerHTML = `
        <div class="stat"><strong>${counts.total}</strong><span>表示中</span></div>
        <div class="stat"><strong>${counts.youtube}</strong><span>YouTube</span></div>
        <div class="stat"><strong>${counts.blog}</strong><span>Web記事</span></div>
        <div class="stat"><strong>${counts.high}</strong><span>重要度A以上</span></div>
      `;
    }

    function render() {
      const filtered = DATA.items.filter(matches).sort(compareItems);
      renderStats(filtered);
      if (!filtered.length) {
        itemsEl.innerHTML = `<div class="empty">条件に合う記事がありません。</div>`;
        return;
      }
      itemsEl.innerHTML = filtered.map((item) => `
        <article>
          <div class="meta">
            <span class="badge source-${item.source}">${labels[item.source] || item.source}</span>
            <span class="badge importance-${item.importance}">重要度 ${item.importance || "C"}</span>
            <span class="badge">${item.category || "未分類"}</span>
          </div>
          <h2>${escapeHtml(item.title)}</h2>
          <div class="byline">
            <span>${escapeHtml(item.author || labels[item.source] || "")}</span>
            <span class="date-pill">${formatDate(item.published_at)}</span>
          </div>
          <p>${escapeHtml(item.summary || item.text || "")}</p>
          <ul>${(item.points || []).slice(0, 3).map((point) => `<li>${escapeHtml(point)}</li>`).join("")}</ul>
          <a class="source-link" href="${escapeAttr(item.url)}" target="_blank" rel="noopener">元URLを開く</a>
        </article>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));
    }
    function escapeAttr(value) {
      return escapeHtml(value || "#");
    }
    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return escapeHtml(value);
      return date.toLocaleDateString("ja-JP", { year: "numeric", month: "short", day: "numeric" });
    }
    function itemTime(item) {
      const date = new Date(item.published_at || 0);
      return Number.isNaN(date.getTime()) ? 0 : date.getTime();
    }
    function compareItems(a, b) {
      if (state.sort === "date") {
        const dateDelta = itemTime(b) - itemTime(a);
        if (dateDelta !== 0) return dateDelta;
      }
      const rank = { S: 0, A: 1, B: 2, C: 3 };
      return (rank[a.importance] ?? 9) - (rank[b.importance] ?? 9);
    }
    query.addEventListener("input", (event) => { state.query = event.target.value; render(); });
    source.addEventListener("change", (event) => { state.source = event.target.value; render(); });
    importance.addEventListener("change", (event) => { state.importance = event.target.value; render(); });
    sort.addEventListener("change", (event) => { state.sort = event.target.value; render(); });
    render();
  </script>
