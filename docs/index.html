  <style>
    :root {

    h2 {

      .grid { grid-template-columns: 1fr; }

  <script>
    const DATA = {"generatedAt": "2026-07-06T19:46:57", "items": [{"source": "blog", "title": "OpenAI、ChatGPTでの広告テストを日本含む5ヵ国へ拡大 回答の独立性は維持", "url": "https://news.google.com/rss/articles/CBMiT0FVX3lxTE5wS0NWamV6aF82N0Q4dnVzczg0S3JONkszUjF4bW5zZVN2QTItM3MxSFZ6S3ZrR1ZpcFB4eDJTMXVieXhnMXhXQzM1dFRYdnc?oc=5", "text": "OpenAI、ChatGPTでの広告テストを日本含む5ヵ国へ拡大 回答の独立性は維持：commercezine    MarkeZine", "author": "Google News: ChatGPT広告", "published_at": "2026-07-04T22:25:37+00:00", "category": "生成AI活用・GPT広告", "importance": "S", "summary": "OpenAIがChatGPTにおける広告テストを日本を含む5ヵ国に拡大することを発表した。この施策により、ChatGPTユーザーに対して広告配信が可能になる一方で、AIの回答の独立性と信頼性は維持されることが強調されている。広告主にとって新たなマーケティングチャネルが開拓される重要な動きである。", "points": ["ChatGPTの広告テストが日本を含む5ヵ国に拡大され、新たな広告配信プラットフォームとして機能し始める", "AI回答の独立性維持により、ユーザー信頼を損なわないバランスの取れた広告統合が実現される", "生成AIプラットフォームでの広告運用が本格化し、マーケティング戦略の新たな選択肢が増加する"], "metrics": {}, "id": "eed0a4536ca9e2d9"}, {"source": "blog", "title": "SEOは「キーワード検索」から「意思決定エンジン」へ、AI検索がもたらす10の変化（前編）", "url": "https://webtan.impress.co.jp/e/2026/07/06/52884", "text": "SEOは「キーワード検索」から「意思決定エンジン」へ、AI検索がもたらす10の変化（前編） \n  nakui  \n  2026年7月6日 \n \n      Moz - SEOとインバウンドマーケティングの実践情報 \n \n  \n   \n     シェア \n      \n   \n  \n   \n     ポスト \n      \n   \n  \n   \n     はてブ \n      \n   \n  \n   \n     Bluesky \n      \n   \n  \n    優先するニュース提供元に追加 \n   \n  \n \n             \n \n AI検索の登場で何が変わったのか？ AIに関して正しておくべき誤解とは？ 自社がAI検索に備えられているかを評価するには、どうすればいいのか？ \n SEOでは、長らく「検索結果からいかに自サイトへのクリックを獲得するか」が課題だった。表示回数もメタデータも、基本的にはクリックを増やす材料だった。しかし、AI検索はSEOの戦場を「クリックの前」に変えてきている。 \n 長年、SEOの成果は説明しやすかった。そのプロセスの多くが目に見えるもので、次のような流れだった： \n \n  ユーザーが検索し、  \n  結果を見て、  \n  ページをクリックし、  \n  うまくいけばコンバージョンに至る  \n \n しかしAI検索の登場で、これが難しくなっている。ユーザーは今や、次のような流れで検索している：  \n \n  複数の条件を含む詳細な質問をし、  \n  AIがまとめた回答を得て、  \n  選択肢を比較し、  \n  優先順位を決めてから、  \n  検索結果をクリックする  \n \n クリックが重要でなくなったわけではないが、 クリックの前、つまりAIが生成する回答の中でもSEOの効果が発揮されるようになっている ということは理解しておきたい。 \n クリック前の段階では、次のようなことが起きている可能性がある： \n \n ブランドについて言及されたり、 \n 引用されたり、 \n 推奨されたり、 \n 誤って伝えられたり、 \n 無視されたりする \n \n この記事では、次の3つについて、私の見解を紹介する： \n \n AI検索と最適化に関する、正しておきたい誤解 \n AI検索の最適化に影響を与える10の変化 \n 自分のブランドがAI検索に対する備えができているかを評価する方法 \n \n まず、いくつかの 誤解 について触れてから、 AI検索の登場で変わった10の点 を解説していく。 \n \n AI検索と最適化に関する、正しておきたい誤解 \n \n 誤解を正す1 AI検索は従来の検索に取って代わるものではない \n 現在、私たちの業界で最大のリスクの1つは、AI検索に過剰反応することだ。次のように極端にふるまう人たちがいるが、どちらの見方も役に立たない： \n \n 「従来のSEOを不要にするもの」としてAI検索を捉える \n 「意味のある変化は何も起きていない」かのように振る舞う \n \n  AI検索は従来の検索に取って代わるものではない （リンク先は日本語記事）。AI検索は 検索ジャーニーを拡張するもの だ。そのため、AI検索に対してもSEOの基本的な施策は依然として重要だ： \n \n クロール可能性 \n インデックス可能性 \n 技術的な明確さ \n 有用なコンテンツ など \n \n グーグルによると、グーグル検索の生成AI機能はコアとなる「検索順位決定システム」と「品質システム」が元になっているため、 基本的なSEOのベストプラクティスは引き続き有効 だという。LLM（大規模言語モデル）は、学習中に取得した情報だけで機能するわけではない。AIシステムは必要に応じてリアルタイムに情報を調べて最新の回答を生成することもある。その際にAIシステムが利用するのが、次のような技術だ： \n \n 情報検索 \n グラウンディング \n ウェブ検索 \n その他の外部データソースを利用する \n \n そう。AI検索は最新の情報を考慮するために、既存の検索を裏で活用しているのだ。だからこそ、従来のSEOは依然として重要だ。ページにアクセスできなかったり、オーソリティ（権威性）が低かったりすれば、AIシステムが信頼して利用できるシグナルは少なくなる。 \n 「AI検索」が「既存の検索」と違っているポイントは、次の3つだ： \n \n 表面的な部分 \n 動作 \n 測定の仕方 \n \n こうした変化によって、最適化すべき対象も変わってくる。今では検索順位やクリック数だけでなく、次のことも最適化の対象とする必要がある： \n \n AI生成の回答内でブランドの情報が取得され、 \n 正確に記述され、 \n 引用され・リンクされ、 \n 推奨され、 \n 比較され、 \n 選択されるかどうか \n \n \n 誤解を正す2 従来の検索とAI検索に関する最大の誤解 \n 私の会社 SEOFOMOのオーガニック検索トレンド調査 では、 根強く残る誤解 がいくつか明らかになっているため、具体論に入る前に確認しておきたい。 \n    \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n \n だからこそ、 AI検索最適化 は 「SEOの代替」や「裏技で成り立つ孤立した分野」 だと考えるべき ではない 。むしろ 「検索最適化の進化形」 だと捉えるべきだ。 \n SEOの基本に立脚しながらも、次のようなものを考慮して拡張されたものと考えよう： \n \n 統合された回答 \n  クエリファンアウト  \n ブランド表現 \n サイテーション \n クリック前の影響力 など \n \n \n 誤解を正す3 エージェント型フローがもたらす新たな課題 \n この項目に関しては、「誤解」というよりも「見落としがちな点」というほうが正しいかもしれない。 \n 意思決定や取引がどこで行われるかにも注目すべきだ。AIシステムは現在「調査」「比較」「絞り込み」の段階に影響を与えることが多いが、最終的なコンバージョンは依然としてブランドのウェブサイト上で行われている。 \n しかし、ショッピングにおいては、AIや検索プラットフォームが商品の発見やレコメンデーション、 場合によっては購入完了までをAIインターフェイスに近づける コマース機能を導入しており、状況はすでに変わりつつある。 \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  出典： Profound   \n ChatGPTやグーグルのAI Modeはすでに eコマース連携機能を導入しており 、これにはプラットフォーム上でのコンバージョンを促すエージェント型チェックアウトが含まれる。 \n SEO担当者にとって、これはビジビリティと測定の新たな課題となる。「サイトを訪れる前のユーザーの意思決定」にAIが影響を与えるのであれば、クリックする動機が失われ、コンバージョンが発生する場所が変わってしまうからだ。 \n トラフィックは依然として有用なシグナルではあるが、AI検索のパフォーマンスを完全に測定できるものではない。 \n AI検索の最適化に影響を与える10の変化 \n ここからは、私が目にしている主な変化と、それらが最適化に及ぼす影響を紹介していく。 \n \n 変化1 「決定論的なクリック」から「確率論的なクリック」に移行している \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n 従来のSEOは 検索順位やクリック数 などの指標に依存していたが、AI検索では回答内でユーザージャーニーを展開できるようになる。システムは、ユーザーがリンクをクリックする前に選択肢を要約し、ソースを引用し、ブランドを推奨できる。 \n これにより、AIはサイトへの訪問を促さずに意思決定に影響を与えられるため、クリック数を予測しにくくなる。 \n AI検索最適化では、「検索順位」「トラフィック」「直接アトリビューション可能なコンバージョン」だけでなく、次の3つに重点を置くべきだ： \n \n  ブランドのビジビリティ  \n サイテーション（言及） \n 正確な表現 \n \n \n 変化2 AI検索は今や「パフォーマンス」と「ブランディング」のチャネルとなっている \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n ChatGPTやGeminiのようなプラットフォームでのAIによるレコメンデーションは、 すぐにクリックされることはなくても、ブランドの想起や好みに影響を与える 。 \n AIによる「誤情報」や「情報の欠落」があれば、それはビジビリティの問題につながる。ページレベルの最適化だけでは解決できないため、ブランドの表現が優先事項となる。 \n AI検索のワークフローのなかで、次の3つに重点を置き、自分のブランドがどのように表現されているかを観察しよう： \n \n 正確性 \n 感情 \n 第三者による検証 \n \n \n 変化3 会話形式のプロンプトは、従来のキーワードより予測しにくい \n 従来の キーワード調査 と異なり、AI検索の動作ははるかに「動的で」「コンテキストに依存する」ものだ。ユーザーは短いぶつ切りのキーワードだけで検索するわけではない。次のようなものを組み合わせた、より長く具体的な質問をするようになっている： \n \n ニーズ \n 条件 \n 比較 \n 好み \n 後続の質問 \n \n たとえば、ユーザーは「履きやすいジーンズ」ではなく、次のように検索するかもしれない。 \n  アウトドア活動に向いていて、硬すぎない生地感の履きやすいジーンズは？  \n こうしたプロンプトは予測が難しいだけでなく、他の要素によって変わることもある。たとえば次のようなものがプロンプトに影響を与える： \n \n ユーザーのニーズ \n それまでのコンテキスト \n 再質問かどうか \n \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  画像出典： Moz LLM Prompt Suggestions ツール  \n だからこそ、 AI検索のビジビリティを評価 する際に、 個々のさまざまなプロンプトを追跡しようとするべきではない 。 \n 代わりに、次の項目にそってプロンプトをグループ化して分析すれば、はるかに役立つ： \n \n トピック \n 意図 \n 製品 \n サービスライン \n カスタマージャーニーの段階 \n 購入者が選択肢を評価する際に実際に用いる条件 \n \n これにより、重要なプロンプト群全体で、自分のブランド、製品、ページが一貫して表示され、正確に記述され、引用され、推奨されているかどうかを把握しやすくなる。 \n AI検索に 最適化 する際にも、個々のプロンプトを対象にするべきではない。こうしたコンテキストを切り捨てることになってしまうからだ。 \n 代わりに、カスタマージャーニー全体を通じて、自分の製品やサービスに関する トピックレベルでのオーソリティ（権威性）を構築しよう 。 \n \n 変化4 検索システムは、情報を取得するシステムではなく、意思決定エンジンとしての役割が強まっている \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n  従来の検索 では通常、多くの結果が返され、それを ユーザーが評価 していた。AI検索はさらに一歩進んで、「情報を統合し、選択肢を比較し、より絞り込まれた選択肢を推奨する」ことが多い。 \n とはいえ、AIシステムが常にユーザーに代わって「決定」するわけではないし、情報検索の重要性がなくなったわけでもない。情報検索は依然として重要だが、そのインターフェイスはより意思決定を支援するものになる傾向が強まっている。 \n 最適化を図るには、「なぜ自分のブランドが特定のユースケースや比較に適しているのか」を AIシステムが理解できるようにコンテンツを作成しよう 。 \n \n 変化5 パーソナライゼーションは「セグメントレベル」から「個人レベル」に移行している \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n AI検索のユーザー体験は一様ではなく、人によって異なる。具体的には、次のような要素の影響を受ける： \n \n プラットフォーム \n 場所 \n 言語 \n セッションのコンテキスト \n \n グーグルも、「ユーザーがパーソナライゼーションを有効にすれば、AI Modeは過去の検索履歴に基づいてよりパーソナライズされた結果になる」と 説明している 。 \n AIの回答を「検索順位が固定された結果」と見なしてはいけない。2人のユーザーが同じ質問をした場合でも、コンテキストによってそれぞれの結果が異なることもある。 \n  プロンプトの追跡 は、検索順位の追跡ではなくサンプリングと考えよう。1つの結果に過剰反応するのではなく、次のようなパターンを追跡することだ： \n \n トピック \n プラットフォーム \n ジャーニーの各段階 \n \n \n 変化6 プロンプトがサブクエリに分解されると、クエリからページへのターゲティングは機能しなくなる \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n AI検索は、クエリを特定のページにマッピングするわけではない。会話形式のプロンプトには、次のような複数のサブニーズが暗示されている場合がある： \n \n 定義 \n 比較 \n 価格情報など \n \n 最適化を図るには、 トピックレベルのオーソリティ（権威性） を構築し、情報を抽出しやすくして、内容の薄いセクションや JavaScriptを多用したセクション に埋もれないようにする必要がある。 \n \n 変化7 検索と購入のジャーニーは連続的でステートフル \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n 従来の検索とは異なり、AIシステムは1回のセッションの中で連続して検索できる。ユーザーは新たな検索を始めなくても、広範な情報収集をしたあとに購入決定へと移行するような動きもできる。 \n 最初のクエリだけでなく、認知から購入後までの ジャーニー全体をサポート するコンテンツを構築しよう。 \n これは、ユーザーが選択肢を比較したうえで行動を起こす次のような分野で特に重要だ： \n \n eコマース \n SaaS \n 旅行 \n 金融 \n ヘルスケア \n \n \n 変化8 ブランドの信頼性とオーソリティは、システムレベルのフィルターとして機能する \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n AIシステムはオウンドコンテンツを利用できるが、次のような第三者のソースから情報を抽出し、統合することもできる： \n \n メディア報道 \n レビューサイト \n ソーシャルプラットフォーム \n \n つまり、AIでのビジビリティは、次のようなブランドオーソリティと重なるシグナルによって形成されるということだ： \n \n エンティティの認知度 \n 信頼できるメンション \n 裏付け など \n \n 自分のウェブサイトで自分のことをどう説明しているかだけでなく、 信頼できる外部ソースがその情報を裏付けているかどうかが、成否を左右する 。 \n AI検索では、次のようなものの連携を強化しなければならなくなった： \n \n SEO \n  デジタルPR  \n ブランド \n ソーシャル \n コミュニティ \n レピュテーション管理 \n \n \n 変化9 一部の取引は、AI検索インターフェイスに組み込まれつつある \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  \n eコマースでは、発見から購入までの流れがAIインターフェイスに近づいている。OpenAIは、対象となるEtsyおよびShopifyの出店者向けのChatGPTでInstant Checkout（即時決済）機能を導入した。 \n 一方、グーグルはAI ModeとGeminiアプリで、対象となる米国の小売業者向けにUCP（ユニバーサルコマースプロトコル）を活用したチェックアウト機能を発表した。まだ限定的な導入であり、ユニバーサル（普遍的）なeコマースフローではない。 \n eコマースサイトにとって、 マシンリーダブル（機械判読可能）な商品データ の重要性はさらに高まっている。次の内容は、ウェブ全体で正確かつ一貫している必要がある： \n \n 属性 \n 価格 \n 在庫状況 \n 配送 \n 返品 \n 販売者のポリシー \n \n \n 変化10 一部のAIプラットフォームはJavaScriptのレンダリングに苦慮している \n     \n                   \n               \n               \n               \n               \n               \n                   \n\n   \n  出典： YouTubeのTech SEO Connect   \n すべてのAIクローラーがGooglebotのように動作するわけではない。グーグルはJavaScriptを多用するサイトのレンダリング能力を大幅に改善させたが、他のAIクローラーや検索システムには同様の機能がないこともある。 \n JavaScriptを多用するコンテンツは情報検索の点でリスクがあるため、重要な情報はできる限りクロール可能なHTMLでレンダリングされるようにしよう。 \n \n この記事は、前後編の2回に分けてお届けする。AI検索がもたらす変化と影響について述べた今回に続いて、後編となる次回は「AI検索のパフォーマンスと相関性がある10のブランド特性」「AI検索対応チェックリスト」「スコアを解釈して優先順位を付ける方法」について説明する。 \n （後編は7/13公開予定） \n \n \n        \n       \n          \n         この記事をシェアしてほしいパン！ \n       \n       \n          \n                シェアする               \n                     \n                   \n                 \n \n \n この記事の筆者 \n \n                       \n                                                 \n                           \n                             \n                                                             [ 執筆 ]  \n                                                             Aleyda Solis \n                                                           \n                                                       \n                                                   \n                       \n                       \n                        \n この記事は、 Moz Blog  に掲載された以下の記事を、Mozの許諾を得て日本語化したものです。 \n   \n 原文： 「 The New Rules of AI Visibility and How To Prepare for It 」 by Aleyda Solis （2026/05/21） \n 記事セレクション： 渡辺隆広  翻訳： 株式会社ガリレオ", "author": "Web担当者Forum", "published_at": "2026-07-05T22:05:00+00:00", "category": "SEO・AI検索最適化・マーケティング戦略", "importance": "S", "summary": "AI検索の登場により、SEOの最適化対象が「クリック獲得」から「AI生成回答内でのブランド表現」へシフトしている。従来のSEOは依然として重要だが、ブランドのビジビリティ、サイテーション、正確な表現など新たな指標が必要になる。会話形式のプロンプトは従来のキーワードより予測困難であり、トピックや意図でグループ化した分析が有効である。", "points": ["AI検索はクリック前の段階でブランドが言及・引用・推奨・誤伝される可能性があり、従来のSEO基本施策（クロール可能性、インデックス可能性）は依然として重要", "AI検索最適化は「SEOの代替」ではなく「検索最適化の進化形」であり、統合された回答、クエリファンアウト、ブランド表現、サイテーション、クリック前の影響力を考慮する必要がある", "会話形式のプロンプトは個別追跡ではなく、トピック・意図・製品・カスタマージャーニー段階でグループ化して分析し、ブランドの一貫性と正確性を評価すべき"], "metrics": {}, "id": "d36f833ebbee4376"}, {"source": "blog", "title": "生活者に届く前に勝負が決まる！？ ──AI検索（AIO）時代にブランドが取るべき最適化の全体像", "url": "https://www.advertimes.com/20260706/article547946/?utm_source=feed", "text": "AIは生活者の情報収集、購買行動を大きく変えていこうとしています。本連載では、主に購買行動に焦点を当てて、AIによる生活者変化を捉えていきます。前回は、『4人に1人は「AIショッパー」の時代へ――\"買う\"を委ねる消費者、それでも残る\"買物\"の体験価値とは？』をテーマに記事を公開。今回は、「AI検索時代の『AIO対策』」をテーマに博報堂買物研究所 副所長の飯島拓海氏が、Hakuhodo DY ONE ONE-AIO Lab 所長 登 章良氏に最新のトレンドを聞きました。 \n The post  生活者に届く前に勝負が決まる！？ ──AI検索（AIO）時代にブランドが取るべき最適化の全体像  first appeared on  AdverTimes.（アドタイ） by 宣伝会議 .", "author": "AdverTimes", "published_at": "2026-07-06T08:1 s, cinematic product commercials, 3D CGI animations, and viral short videos. Every project is designed to bring products and ideas to life with creativity and high-quality visuals.\n\n✨ AI Commercials\n🎬 Cinematic Product Ads\n🎨 3D CGI Animation\n📱 Viral Short-Form Content\n\nSubscribe and follow Go Of Your Fergy for fresh AI advertising content and creative visuals.\n#aivideo #aiads #aicommercial #burger#", "author": "𝗡𝗼𝘃𝗮 𝗧𝗼𝗼𝗻𝘀 𝗔𝗜", "published_at": "2026-07-06T18:27:23Z", "category": "AI広告・生成AI活用", "importance": "B", "summary": "AI技術を活用した広告制作サービスの紹介。アイキャッチな広告、シネマティック商品CM、3D CGIアニメーション、バイラル動画など、複数の広告フォーマットを提供している。生成AIを用いた高品質なビジュアル制作により、商品やアイデアを効果的に表現することを特徴としている。", "points": ["AI技術を活用したシネマティック広告とCGIアニメーション制作が可能", "短編動画やバイラルコンテンツなど、複数の広告フォーマットに対応", "生成AIによる高品質なビジュアル制作で商品プロモーションを実現"], "metrics": {"views": 4}, "id": "eb1fd87b3848aac6"}]};
    const state = { query: "", source: "", importance: "", sort: "date" };
    const labels = { youtube: "YouTube", blog: "Web記事", newsletter: "ニュースレター" };
    const generated = document.getElementById("generated");
    const query = document.getElementById("query");
    const source = document.getElementById("source");
    const importance = document.getElementById("importance");
    const sort = document.getElementById("sort");
    const itemsEl = document.getElementById("items");
    const statsEl = document.getElementById("stats");
    generated.textContent = `更新: ${new Date(DATA.generatedAt).toLocaleString("ja-JP")}`;

    [...new Set(DATA.items.map((item) => item.source).filter((name) => name !== "x"))].forEach((name) => {
      const option = document.createElement("option");
      option.value = name;
      option.textContent = labels[name] || name;
      source.appendChild(option);
    });

    function matches(item) {
      const haystack = `${item.title} ${item.summary} ${item.text} ${item.category}`.toLowerCase();
      return (!state.query || haystack.includes(state.query.toLowerCase()))
        && (!state.source || item.source === state.source)
        && (!state.importance || item.importance === state.importance);
    }

    function renderStats(items) {
      const counts = {
        total: items.length,
        youtube: items.filter((item) => item.source === "youtube").length,
        blog: items.filter((item) => item.source === "blog").length,
        high: items.filter((item) => ["S", "A"].includes(item.importance)).length,
      };
      statsEl.innerHTML = `
        <div class="stat"><strong>${counts.total}</strong><span>表示中</span></div>
        <div class="stat"><strong>${counts.youtube}</strong><span>YouTube</span></div>
        <div class="stat"><strong>${counts.blog}</strong><span>Web記事</span></div>
        <div class="stat"><strong>${counts.high}</strong><span>重要度A以上</span></div>
      `;
    }

    function render() {
      const filtered = DATA.items.filter(matches).sort(compareItems);
      renderStats(filtered);
      if (!filtered.length) {
        itemsEl.innerHTML = `<div class="empty">条件に合う記事がありません。</div>`;
        return;
      }
      itemsEl.innerHTML = filtered.map((item) => `
        <article>
          <div class="meta">
            <span class="badge source-${item.source}">${labels[item.source] || item.source}</span>
            <span class="badge importance-${item.importance}">重要度 ${item.importance || "C"}</span>
            <span class="badge">${item.category || "未分類"}</span>
          </div>
          <h2>${escapeHtml(item.title)}</h2>
          <div class="byline">
            <span>${escapeHtml(item.author || labels[item.source] || "")}</span>
            <span class="date-pill">${formatDate(item.published_at)}</span>
          </div>
          <p>${escapeHtml(item.summary || item.text || "")}</p>
          <ul>${(item.points || []).slice(0, 3).map((point) => `<li>${escapeHtml(point)}</li>`).join("")}</ul>
          <a class="source-link" href="${escapeAttr(item.url)}" target="_blank" rel="noopener">元URLを開く</a>
        </article>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));
    }
    function escapeAttr(value) {
      return escapeHtml(value || "#");
    }
    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return escapeHtml(value);
      return date.toLocaleDateString("ja-JP", { year: "numeric", month: "short", day: "numeric" });
    }
    function itemTime(item) {
      const date = new Date(item.published_at || 0);
      return Number.isNaN(date.getTime()) ? 0 : date.getTime();
    }
    function compareItems(a, b) {
      if (state.sort === "date") {
        const dateDelta = itemTime(b) - itemTime(a);
        if (dateDelta !== 0) return dateDelta;
      }
      const rank = { S: 0, A: 1, B: 2, C: 3 };
      return (rank[a.importance] ?? 9) - (rank[b.importance] ?? 9);
    }
    query.addEventListener("input", (event) => { state.query = event.target.value; render(); });
    source.addEventListener("change", (event) => { state.source = event.target.value; render(); });
    importance.addEventListener("change", (event) => { state.importance = event.target.value; render(); });
    sort.addEventListener("change", (event) => { state.sort = event.target.value; render(); });
    render();
  </script>
